schema:
  - graph/*.graphqls

# Ke mana file otomatis hasil generate akan diletakkan
exec:
  filename: graph/generated.go
  package: graph

model:
  filename: graph/model/models_gen.go
  package: model

# Petakan tipe GraphQL langsung ke domain model GORM milikmu
autobind:
  - "github.com/ihsanpraditya/gin-clean-1/internal/model"
  - "github.com/ihsanpraditya/gin-clean-1/internal/dto"

resolver:
  layout: follow-schema
  dir: graph
  package: graph
